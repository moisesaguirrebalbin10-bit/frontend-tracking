<div class="contabilidad-container">
  <h2>Contabilidad</h2>
  <div class="mb-3">
    <button class="btn btn-outline-primary me-2" [class.active]="filtro==='dia'" (click)="setFiltro('dia')">Por Día</button>
    <button class="btn btn-outline-primary me-2" [class.active]="filtro==='semana'" (click)="setFiltro('semana')">Por Semana</button>
    <button class="btn btn-outline-primary me-2" [class.active]="filtro==='mes'" (click)="setFiltro('mes')">Por Mes</button>
    <button class="btn btn-outline-primary me-2" [class.active]="filtro==='rango'" (click)="setFiltro('rango')">Por Rango</button>
    <span *ngIf="filtro==='rango'">
      <input type="date" [(ngModel)]="fechaInicio" class="form-control d-inline-block w-auto mx-1" />
      <input type="date" [(ngModel)]="fechaFin" class="form-control d-inline-block w-auto mx-1" />
    </span>
  </div>
  <div class="mb-4">
    <div class="row">
      <div class="col-md-4">
        <div class="card card-body bg-dark text-white mb-2">
          <strong>Ingresos:</strong> {{ ingresoTotal | currency:'PEN':'symbol' }}
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-body bg-dark text-white mb-2">
          <strong>Egresos:</strong> {{ egresoTotal | currency:'PEN':'symbol' }}
        </div>
      </div>
      <div class="col-md-4">
        <div class="card card-body bg-dark text-white mb-2">
          <strong>Ingreso Neto:</strong> {{ ingresoNeto | currency:'PEN':'symbol' }}
        </div>
      </div>
    </div>
  </div>
  <div class="mb-4">
    <app-ingresos-table [ingresos]="ingresos" [loading]="cargandoIngresos"></app-ingresos-table>
  </div>
  <button class="btn btn-success mb-3" (click)="onAdd()">Agregar Egreso</button>
  <ng-container *ngIf="showForm; else tablaEgresos">
    <app-egreso-form [egreso]="egresoEdit" (save)="onSave($event)" (cancel)="onCancel()"></app-egreso-form>
  </ng-container>
  <ng-template #tablaEgresos>
    <app-egresos-table [egresos]="egresos" [loading]="cargandoEgresos" (edit)="onEdit($event)"></app-egresos-table>
  </ng-template>
</div>
