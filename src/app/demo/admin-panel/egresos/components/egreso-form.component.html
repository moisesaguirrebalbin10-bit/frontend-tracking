<form [formGroup]="form" (ngSubmit)="submit()" class="egreso-form">
  <div class="mb-3">
    <label>Nombre *</label>
    <input formControlName="nombre" class="form-control" />
    <div *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-danger">Requerido</div>
  </div>
  <div class="mb-3">
    <label>Descripción</label>
    <textarea formControlName="descripcion" class="form-control"></textarea>
  </div>
  <div class="mb-3">
    <label>Banco o método de pago *</label>
    <input formControlName="banco_metodo" class="form-control" />
    <div *ngIf="form.get('banco_metodo')?.invalid && form.get('banco_metodo')?.touched" class="text-danger">Requerido</div>
  </div>
  <div class="mb-3">
    <label>Categoría *</label>
    <input formControlName="categoria" class="form-control" />
    <div *ngIf="form.get('categoria')?.invalid && form.get('categoria')?.touched" class="text-danger">Requerido</div>
  </div>
  <div class="mb-3">
    <label>Precio *</label>
    <input type="number" formControlName="precio" class="form-control" min="0" />
    <div *ngIf="form.get('precio')?.invalid && form.get('precio')?.touched" class="text-danger">Requerido y debe ser mayor o igual a 0</div>
  </div>
  <div class="mb-3">
    <label>Fecha *</label>
    <input type="date" formControlName="fecha" class="form-control" [max]="maxDate" />
    <div *ngIf="form.get('fecha')?.invalid && form.get('fecha')?.touched" class="text-danger">
      Fecha requerida y solo se permite hasta 1 semana atrás
    </div>
  </div>
  <div class="d-flex justify-content-end">
    <button type="button" class="btn btn-secondary me-2" (click)="onCancel()">Cancelar</button>
    <button type="submit" class="btn btn-primary">Guardar</button>
  </div>
</form>
