<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:"><img src="assets/images/logo-dark.svg" alt="logo" /></a>
      </div>
      <div class="card my-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-end mb-4">
            <h3 class="mb-0"><b>Iniciar Sesión</b></h3>
            <span class="text-muted small">Acceso para usuarios autorizados</span>
          </div>
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group mb-3">
              <label class="form-label" for="email">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" formControlName="email" placeholder="Correo Electrónico" />
              <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger">
                Ingresa un correo válido
              </div>
            </div>
            <div class="form-group mb-3">
              <label class="form-label" for="password">Contraseña</label>
              <input type="password" class="form-control" id="password" formControlName="password" placeholder="Contraseña" />
              <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-danger">
                La contraseña es obligatoria
              </div>
            </div>
            <div *ngIf="error()" class="alert alert-danger">
              {{ error() }}
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary" [disabled]="loading() || loginForm.invalid">
                <span *ngIf="loading()" class="spinner-border spinner-border-sm" role="status"></span>
                Ingresar
              </button>
            </div>
          </form>

        </div>
      </div>
      <div class="auth-footer row">
        <div class="col my-1">
          <p class="m-0">Copyright © Desarrolladores Ezzeta</p>
        </div>
      </div>
    </div>
  </div>
</div>
