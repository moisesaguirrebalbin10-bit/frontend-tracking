<div class="auth-main">
  <div class="auth-wrapper v3">
    <div class="auth-form">
      <div class="auth-header">
        <a href="javascript:"><img src="assets/images/logo-dark.svg" alt="logo img" /></a>
      </div>
      <div class="card my-5">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-end mb-4">
            <h3 class="mb-0"><b>Crear Cuenta</b></h3>
            <a [routerLink]="['/login']" class="link-primary">¿Ya tienes cuenta?</a>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="form-group mb-3">
                <label class="form-label" for="firstName">Nombre*</label>
                <input type="text" class="form-control" id="firstName" placeholder="Nombre" />
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group mb-3">
                <label class="form-label" for="lastName">Apellido*</label>
                <input type="text" class="form-control" id="lastName" placeholder="Apellido" />
              </div>
            </div>
          </div>
          <div class="form-group mb-3">
            <label class="form-label" for="company">Empresa</label>
            <input type="text" class="form-control" id="company" placeholder="Empresa" />
          </div>
          <div class="form-group mb-3">
            <label class="form-label" for="emailAddress">Correo Electrónico*</label>
            <input type="email" class="form-control" id="emailAddress" placeholder="Correo Electrónico" />
          </div>
          <div class="form-group mb-3">
            <label class="form-label" for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Contraseña" />
          </div>
          <p class="mt-4 text-sm text-muted">
            Al registrarte, aceptas nuestros
            <a href="javascript:" class="text-primary">Términos de Servicio</a>
            y
            <a href="javascript:" class="text-primary">Política de Privacidad</a>
          </p>
          <div class="d-grid mt-3">
            <button type="button" class="btn btn-primary">Crear Cuenta</button>
          </div>
        </div>
      </div>
      <div class="auth-footer row">
        <!-- <div class=""> -->
        <div class="col my-1">
          <p class="m-0">Copyright © Desarrolladores Ezzeta</p>
        </div>
        <!-- </div> -->
      </div>
    </div>
  </div>
</div>
